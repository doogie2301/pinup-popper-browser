name: CI

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PinUpBrowser-files
          path: |
            dist/PinUpBrowser.exe
            dist/LICENSE
            dist/README.md
            dist/config.yml
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PinUpBrowser-files
          path: dist

      - name: Create tagged release zip
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist/PinUpBrowser.exe','dist/LICENSE','dist/README.md','dist/config.yml' -DestinationPath "dist/PinUpBrowser-${{ github.ref_name }}.zip" -Force

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/PinUpBrowser-${{ github.ref_name }}.zip
