name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact_name: "${{ steps.artifact_meta.outputs.artifact_name }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: github-actions
          fail_ci_if_error: false
          use_oidc: true

      - name: Build release bundle
        run: npm run build

      - name: Set artifact metadata
        id: artifact_meta
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ('${{ github.ref }}' -like 'refs/tags/*') {
            $buildVersion = '${{ github.ref_name }}'
          }
          else {
            $buildVersion = "v$packageVersion"
          }

          $artifactName = "PinUpBrowser-$buildVersion"
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_meta.outputs.artifact_name }}
          path: |
            dist/PinUpBrowser.exe
            dist/LICENSE
            dist/README.md
            dist/config.yml
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create tagged release zip
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist/PinUpBrowser.exe','dist/LICENSE','dist/README.md','dist/config.yml' -DestinationPath "dist/PinUpBrowser-${{ github.ref_name }}.zip" -Force

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: dist/PinUpBrowser-${{ github.ref_name }}.zip
