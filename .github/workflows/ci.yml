name: CI

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    outputs:
      zip_name: "${{ steps.versioned_zip.outputs.zip_name }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release bundle
        run: npm run build

      - name: Set versioned zip filename
        id: versioned_zip
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ('${{ github.ref }}' -like 'refs/tags/*') {
            $buildVersion = '${{ github.ref_name }}'
          }
          else {
            $buildVersion = "v$packageVersion-build.${{ github.run_number }}"
          }

          $zipName = "PinUpBrowser-$buildVersion.zip"
          Rename-Item -Path dist/PinUpBrowser.zip -NewName $zipName
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PinUpBrowser
          path: dist/${{ steps.versioned_zip.outputs.zip_name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PinUpBrowser
          path: dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/${{ needs.build.outputs.zip_name }}
